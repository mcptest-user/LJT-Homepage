url: "https://mcptest-user.github.io/LJT-Homepage"
baseurl: ""
repository: "mcptest-user/LJT-Homepage"

author:
  avatar: "profile.png"
  name: "Junteng Liu"
  pronouns: "he/him"
  bio: "First-year PhD candidate at HKUST NLP Group. Research in NLP, LLM Reasoning, Reinforcement Learning, VLM Hallucination, and LLM Truthfulness."
  location: "Hong Kong, China"
  employer: "HKUST NLP Group"
